name: Flutter Android build

# Verifies that the native app in lib/ actually compiles into a real Android
# APK. This runs on GitHub's own runners, which have normal internet access —
# unlike the restricted sandbox this was originally verified in, where Gradle
# and Android SDK downloads are blocked by network policy. See DL-014 in
# docs/00-product/02-decision-log.md for the full background.

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - '.github/workflows/flutter-android-build.yml'
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ANTHROPIC_API_KEY is only needed so the envied code generator has a
      # value to embed at compile time. Add a real key as a repo secret
      # (Settings -> Secrets and variables -> Actions) if you want the built
      # APK's AI features to actually work; a placeholder is enough to prove
      # the app builds.
      - name: Create .env for build-time codegen
        run: echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY || 'placeholder-for-build-verification' }}" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Drift / Riverpod / freezed / envied)
        run: dart run build_runner build --delete-conflicting-outputs

      # Non-blocking: the 93 findings here are all optional style lints
      # (prefer_const_constructors etc.) from the default flutter_lints set,
      # not real errors — `flutter analyze` still exits non-zero on info-level
      # findings, but they shouldn't stop the APK build from proving the code
      # actually compiles.
      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: travel-cockpit-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
